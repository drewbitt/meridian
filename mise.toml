[tools]
"github:tailwindlabs/tailwindcss" = "4.2.2"
go = "1.26"
"go:github.com/a-h/templ/cmd/templ" = "latest"
"go:github.com/air-verse/air" = "latest"

[env]
CGO_ENABLED = "0"

# ── Development ───────────────────────────────────────────────

[tasks.dev]
description = "Start development servers (templ + tailwind + air)"
depends = ["dev:templ-watch", "dev:tailwind-watch", "dev:air"]
wait_for = ["generate"]

[tasks."dev:templ-watch"]
description = "Watch and regenerate templ files"
run = "templ generate --watch"

[tasks."dev:tailwind-watch"]
description = "Watch and rebuild Tailwind CSS"
run = "tailwindcss -i assets/input.css -o assets/dist/styles.min.css --watch --minify"

[tasks."dev:air"]
description = "Run Go with hot reload"
run = "air"

# ── Code generation ───────────────────────────────────────────

[tasks.generate]
description = "Generate templ and Tailwind CSS"
run = """
mkdir -p assets/dist
templ generate
tailwindcss -i assets/input.css -o assets/dist/styles.min.css --minify
"""
sources = ["templates/**/*.templ", "assets/input.css"]
outputs = ["assets/dist/styles.min.css"]

# ── Build ─────────────────────────────────────────────────────

[tasks.build]
description = "Build production binary"
depends = ["generate"]
run = "go build -o circadian ./cmd/circadian"
sources = ["**/*.go", "go.mod", "go.sum"]
outputs = ["circadian"]

# ── Test ──────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests"
run = "go test -race ./..."

[tasks."test:verbose"]
description = "Run all tests with verbose output"
run = "go test -race -v ./..."

[tasks."test:engine"]
description = "Run engine tests only"
run = "go test -race -v ./internal/engine/"

# ── Lint & format ─────────────────────────────────────────────

[tasks.lint]
description = "Run golangci-lint"
depends = ["generate"]
run = "golangci-lint run ./..."

[tasks."lint:fix"]
description = "Run golangci-lint with auto-fix"
depends = ["generate"]
run = "golangci-lint run --fix ./..."

[tasks.fmt]
description = "Format Go code via golangci-lint"
run = "golangci-lint fmt ./..."

[tasks.tidy]
description = "Tidy go.mod"
run = "go mod tidy"

# ── Clean ─────────────────────────────────────────────────────

[tasks.clean]
description = "Remove build artifacts"
run = """
rm -f circadian
rm -rf assets/dist
find . -name '*_templ.go' -delete
"""
